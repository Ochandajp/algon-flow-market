<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Deposit Funds | Algon Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0e17;
            color: #e0e3eb;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }
        
        .deposit-card {
            background: #0f1322;
            border-radius: 24px;
            border: 1px solid rgba(45,212,191,0.3);
            padding: 30px;
        }
        
        .deposit-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #8a92b0;
            margin-bottom: 30px;
        }
        
        .user-info {
            background: #1a1f30;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2d3748;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #8a92b0;
            font-size: 14px;
        }
        
        .info-value {
            font-weight: 600;
        }
        
        .verified-badge {
            color: #2dd4bf;
        }
        
        .amount-input {
            margin: 20px 0;
        }
        
        .amount-input label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .amount-input input {
            width: 100%;
            padding: 15px;
            background: #1a1f30;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            text-align: center;
        }
        
        .preset-amounts {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .preset-btn {
            background: #1a1f30;
            border: 1px solid #2d3748;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .preset-btn:hover {
            border-color: #2dd4bf;
            color: #2dd4bf;
        }
        
        .min-note {
            font-size: 12px;
            color: #ffc107;
            margin-top: 5px;
        }
        
        .deposit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            border: none;
            border-radius: 12px;
            color: #0a0e17;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .payment-info {
            margin-top: 25px;
            padding: 15px;
            background: rgba(45,212,191,0.1);
            border-radius: 12px;
            display: none;
        }
        
        .payment-info.active {
            display: block;
        }
        
        .payment-info iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 12px;
        }
        
        .status-check {
            margin-top: 20px;
            text-align: center;
        }
        
        .check-status-btn {
            background: #2d3748;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2dd4bf;
            text-decoration: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(45,212,191,0.3);
            border-top-color: #2dd4bf;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="deposit-card">
        <h1><i class="fas fa-plus-circle"></i> Deposit Funds</h1>
        <p class="subtitle">Add funds to start AI trading</p>
        
        <div class="user-info" id="userInfo">
            <div class="info-row">
                <span class="info-label"><i class="fas fa-user"></i> Name</span>
                <span class="info-value" id="userName">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-envelope"></i> Email</span>
                <span class="info-value" id="userEmail">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-map-marker-alt"></i> Country</span>
                <span class="info-value" id="userCountry">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-phone"></i> Phone</span>
                <span class="info-value" id="userPhone">Loading...</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-check-circle"></i> Status</span>
                <span class="info-value" id="userStatus">Loading...</span>
            </div>
        </div>
        
        <div class="amount-input">
            <label>Amount (USD)</label>
            <input type="number" id="amount" placeholder="Enter amount" min="80" step="10">
            <div class="preset-amounts">
                <button class="preset-btn" data-amount="80">$80</button>
                <button class="preset-btn" data-amount="115">$115</button>
                <button class="preset-btn" data-amount="250">$250</button>
                <button class="preset-btn" data-amount="500">$500</button>
                <button class="preset-btn" data-amount="1000">$1,000</button>
                <button class="preset-btn" data-amount="5000">$5,000</button>
            </div>
            <div class="min-note"><i class="fas fa-info-circle"></i> Minimum deposit: $80 USD. Deposits of $115+ auto-verify your account for AI trading.</div>
        </div>
        
        <button class="deposit-btn" id="depositNowBtn"><i class="fas fa-credit-card"></i> Deposit Now</button>
        
        <div class="payment-info" id="paymentInfo">
            <h4 style="margin-bottom: 15px;"><i class="fas fa-qrcode"></i> Complete Payment</h4>
            <div id="paymentFrame"></div>
            <div class="status-check">
                <button class="check-status-btn" id="checkStatusBtn"><i class="fas fa-sync-alt"></i> Check Payment Status</button>
            </div>
        </div>
        
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (!token) window.location.href = 'index.html';
    
    let currentPaymentId = null;
    
    async function loadUserInfo() {
        try {
            const response = await fetch(`${API_URL}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            const userData = data.user;
            
            document.getElementById('userName').innerHTML = userData.fullName;
            document.getElementById('userEmail').innerHTML = userData.email;
            document.getElementById('userCountry').innerHTML = userData.country;
            document.getElementById('userPhone').innerHTML = `${userData.countryCode} ${userData.phoneNumber}`;
            document.getElementById('userStatus').innerHTML = userData.isVerified ? 
                '<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified</span>' : 
                '<span style="color:#ffc107;"><i class="fas fa-clock"></i> Pending Verification</span>';
        } catch (error) {
            console.error('Error loading user info:', error);
        }
    }
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('amount').value = btn.dataset.amount;
        };
    });
    
    document.getElementById('depositNowBtn').onclick = async () => {
        const amount = parseFloat(document.getElementById('amount').value);
        
        if (!amount || amount < 80) {
            alert('Minimum deposit amount is $80 USD');
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/deposit/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ amount: amount })
            });
            const data = await response.json();
            
            if (data.success) {
                currentPaymentId = data.paymentId;
                
                // Show NowPayments donation widget
                const paymentDiv = document.getElementById('paymentFrame');
                paymentDiv.innerHTML = `
                    <a href="${data.nowPaymentsUrl}" target="_blank" rel="noreferrer noopener">
                        <img src="https://nowpayments.io/images/embeds/donation-button-black.svg" alt="Pay with Crypto" style="width: 100%; max-width: 300px; display: block; margin: 0 auto;">
                    </a>
                    <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #8a92b0;">
                        Click the button above to complete your payment with crypto.<br>
                        After payment, click "Check Payment Status" to confirm.
                    </p>
                `;
                
                document.getElementById('paymentInfo').classList.add('active');
                
                // Start checking status periodically
                startStatusCheck();
            } else {
                alert(data.error || 'Failed to create deposit');
            }
        } catch (error) {
            alert('Error creating deposit. Please try again.');
        }
    };
    
    let statusInterval = null;
    
    function startStatusCheck() {
        if (statusInterval) clearInterval(statusInterval);
        statusInterval = setInterval(checkPaymentStatus, 10000);
    }
    
    async function checkPaymentStatus() {
        if (!currentPaymentId) return;
        
        try {
            const response = await fetch(`${API_URL}/api/deposit/check/${currentPaymentId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            if (data.status === 'confirmed') {
                clearInterval(statusInterval);
                alert('✅ Payment confirmed! Your balance has been updated. Redirecting to dashboard...');
                window.location.href = 'dashboard.html';
            } else if (data.status === 'failed') {
                clearInterval(statusInterval);
                alert('❌ Payment failed. Please try again.');
            }
        } catch (error) {
            console.error('Error checking status:', error);
        }
    }
    
    document.getElementById('checkStatusBtn').onclick = checkPaymentStatus;
    
    loadUserInfo();
</script>
</body>
</html>
