<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Deposit Funds | Algon Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0e17;
            color: #e0e3eb;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 80px 16px 40px;
        }

        .deposit-card {
            background: #0f1322;
            border-radius: 24px;
            border: 1px solid rgba(45,212,191,0.3);
            padding: 28px;
        }

        .deposit-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
            color: #2dd4bf;
        }

        .subtitle {
            text-align: center;
            color: #8a92b0;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .amount-input-section {
            margin-bottom: 25px;
        }

        .amount-input-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2dd4bf;
        }

        .amount-input {
            width: 100%;
            padding: 16px;
            background: #1a1f30;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .amount-input:focus {
            outline: none;
            border-color: #2dd4bf;
        }

        .preset-amounts {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preset-btn {
            background: #1a1f30;
            border: 1px solid #2d3748;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .preset-btn:hover {
            border-color: #2dd4bf;
            color: #2dd4bf;
        }

        .network-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(45,212,191,0.2);
            padding-bottom: 15px;
            justify-content: center;
        }

        .tab-btn {
            background: #1a1f30;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: #8a92b0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .tab-btn i {
            margin-right: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            color: #0a0e17;
        }

        .wallet-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .wallet-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .address-container {
            background: #1a1f30;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(45,212,191,0.2);
        }

        .address-label {
            font-size: 11px;
            color: #8a92b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .address-value {
            font-family: monospace;
            font-size: 14px;
            color: #2dd4bf;
            background: #0f1322;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .copy-btn {
            background: #2d3748;
            border: 1px solid rgba(45,212,191,0.3);
            padding: 12px 16px;
            border-radius: 12px;
            color: #2dd4bf;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: rgba(45,212,191,0.15);
            border-color: #2dd4bf;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            border: none;
            border-radius: 12px;
            color: #0a0e17;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .status-box.pending {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid #ffc107;
            display: block;
        }

        .status-box.pending i {
            color: #ffc107;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .status-box .status-text {
            font-weight: 700;
            font-size: 18px;
            color: #ffc107;
        }

        .info-box {
            background: rgba(45,212,191,0.05);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            font-size: 12px;
            color: #8a92b0;
            border: 1px solid rgba(45,212,191,0.15);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2dd4bf;
            text-decoration: none;
            font-size: 13px;
        }

        .qr-placeholder {
            background: #1a1f30;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="deposit-card">
        <h1><i class="fas fa-plus-circle"></i> Deposit Funds</h1>
        <p class="subtitle">Add funds to your account</p>

        <!-- Amount Input -->
        <div class="amount-input-section">
            <label><i class="fas fa-dollar-sign"></i> Enter Amount (USD)</label>
            <input type="number" id="depositAmount" class="amount-input" placeholder="Enter amount" min="50" step="10">
            <div class="preset-amounts">
                <button class="preset-btn" data-amount="50">$50</button>
                <button class="preset-btn" data-amount="100">$100</button>
                <button class="preset-btn" data-amount="500">$500</button>
                <button class="preset-btn" data-amount="1000">$1,000</button>
                <button class="preset-btn" data-amount="5000">$5,000</button>
            </div>
        </div>

        <!-- Network Tabs -->
        <div class="network-tabs">
            <button class="tab-btn active" data-network="usdt-trc20">
                <i class="fas fa-coins"></i> USDT (TRC20)
            </button>
            <button class="tab-btn" data-network="bitcoin">
                <i class="fab fa-bitcoin"></i> Bitcoin (BTC)
            </button>
        </div>

        <!-- USDT TRC20 Panel -->
        <div id="panel-usdt-trc20" class="wallet-panel active">
            <div class="address-container">
                <div class="address-label">📌 USDT Wallet Address</div>
                <div class="address-value" id="usdt-address">TNM2SREr7uAVbumYbzwXvFCa3TejcXAtGV</div>
                <button class="copy-btn" onclick="copyAddress('usdt-address')">
                    <i class="fas fa-copy"></i> Copy Address
                </button>
            </div>
            <div class="qr-placeholder">
                <div id="qrcode-usdt" class="qr-container"></div>
            </div>
            <div class="info-box">
                <i class="fas fa-info-circle"></i> Send ONLY USDT (TRC20) on TRON network to this address.
            </div>
        </div>

        <!-- Bitcoin Panel -->
        <div id="panel-bitcoin" class="wallet-panel">
            <div class="address-container">
                <div class="address-label">📌 Bitcoin Wallet Address</div>
                <div class="address-value" id="btc-address">1PQAwm2hs4jnjigaMG45RbLbg2UfSPqnqS</div>
                <button class="copy-btn" onclick="copyAddress('btc-address')">
                    <i class="fas fa-copy"></i> Copy Address
                </button>
            </div>
            <div class="qr-placeholder">
                <div id="qrcode-btc" class="qr-container"></div>
            </div>
            <div class="info-box">
                <i class="fas fa-info-circle"></i> Send ONLY Bitcoin (BTC) to this address.
            </div>
        </div>

        <!-- Submit Button -->
        <button class="submit-btn" id="submitDepositBtn">
            <i class="fas fa-paper-plane"></i> Submit Deposit Request
        </button>

        <!-- Status Box - Only shows PENDING -->
        <div id="statusBox" class="status-box">
            <i class="fas fa-clock"></i>
            <div class="status-text">PENDING</div>
        </div>

        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
    const API_URL = 'https://algon-flow-market.onrender.com';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (!token) window.location.href = 'index.html';

    const wallets = {
        usdt: { address: 'TNM2SREr7uAVbumYbzwXvFCa3TejcXAtGV' },
        btc: { address: '1PQAwm2hs4jnjigaMG45RbLbg2UfSPqnqS' }
    };

    // Generate QR codes
    function generateQRCodes() {
        const usdtContainer = document.getElementById('qrcode-usdt');
        if (usdtContainer) {
            usdtContainer.innerHTML = '';
            new QRCode(usdtContainer, {
                text: wallets.usdt.address,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff'
            });
        }
        const btcContainer = document.getElementById('qrcode-btc');
        if (btcContainer) {
            btcContainer.innerHTML = '';
            new QRCode(btcContainer, {
                text: wallets.btc.address,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff'
            });
        }
    }

    window.copyAddress = function(elementId) {
        const address = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(address).then(() => {
            const btn = event.target.closest('.copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => btn.innerHTML = originalText, 2000);
        });
    };

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.wallet-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`panel-${btn.dataset.network}`).classList.add('active');
        });
    });

    // Preset amounts
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('depositAmount').value = btn.dataset.amount;
        };
    });

    // Submit deposit request
    document.getElementById('submitDepositBtn').onclick = async () => {
        const amount = parseFloat(document.getElementById('depositAmount').value);
        const statusBox = document.getElementById('statusBox');
        
        if (!amount || amount < 50) {
            alert('Minimum deposit amount is $50 USD');
            return;
        }

        const submitBtn = document.getElementById('submitDepositBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';

        try {
            const response = await fetch(`${API_URL}/api/deposit/request`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ amount })
            });
            
            const data = await response.json();
            
            if (data.success) {
                // Show only PENDING status
                statusBox.className = 'status-box pending';
                document.getElementById('depositAmount').value = '';
                
                // Auto hide after 3 seconds (optional)
                setTimeout(() => {
                    statusBox.style.opacity = '0.5';
                }, 3000);
            } else {
                alert(data.error || 'Request failed');
            }
        } catch (error) {
            alert('Error submitting request');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Deposit Request';
        }
    };

    generateQRCodes();
</script>
</body>
</html>
