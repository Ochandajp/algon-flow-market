<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Withdraw Funds | Algon Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0e17;
            color: #e0e3eb;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        .withdraw-card {
            background: #0f1322;
            border-radius: 24px;
            border: 1px solid rgba(45,212,191,0.3);
            padding: 30px;
        }

        .withdraw-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #8a92b0;
            margin-bottom: 30px;
        }

        .balance-display {
            background: linear-gradient(135deg, #1a1f30, #0f1322);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid rgba(45,212,191,0.2);
        }

        .balance-label {
            font-size: 14px;
            color: #8a92b0;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            color: #2dd4bf;
        }

        .required-amount {
            font-size: 12px;
            color: #ffc107;
            margin-top: 5px;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            background: #1a1f30;
            border: 1px solid #2d3748;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .preset-amounts {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .preset-btn {
            background: #1a1f30;
            border: 1px solid #2d3748;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .preset-btn:hover {
            border-color: #2dd4bf;
            color: #2dd4bf;
        }

        .withdraw-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        .withdraw-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .status-box.pending {
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid #ffc107;
            display: block;
        }

        .status-box .status-text {
            font-weight: 700;
            font-size: 18px;
            color: #ffc107;
        }

        .info-box {
            background: rgba(45,212,191,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #8a92b0;
        }

        .rule-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2dd4bf;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="withdraw-card">
        <h1><i class="fas fa-minus-circle"></i> Withdraw Funds</h1>
        <p class="subtitle">Withdraw your earnings</p>
        
        <div class="balance-display">
            <div class="balance-label">Available Balance</div>
            <div class="balance-amount">$<span id="availableBalance">0</span></div>
            <div class="required-amount" id="requiredMsg"></div>
        </div>

        <div class="rule-box" id="ruleBox">
            <i class="fas fa-chart-line"></i> <strong>Withdrawal Rule:</strong>
            <span id="ruleText">Loading...</span>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-dollar-sign"></i> Amount (USD)</label>
            <input type="number" id="withdrawAmount" placeholder="Enter amount" min="50" step="10">
            <div class="preset-amounts">
                <button class="preset-btn" data-amount="50">$50</button>
                <button class="preset-btn" data-amount="100">$100</button>
                <button class="preset-btn" data-amount="500">$500</button>
                <button class="preset-btn" data-amount="1000">$1,000</button>
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-network-wired"></i> Network</label>
            <select id="network">
                <option value="TRC20">TRC20 (USDT - TRON) - Recommended</option>
                <option value="ERC20">ERC20 (USDT - Ethereum)</option>
                <option value="BEP20">BEP20 (USDT - BSC)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-qrcode"></i> Wallet Address</label>
            <input type="text" id="walletAddress" placeholder="Enter your USDT wallet address">
        </div>
        
        <button class="withdraw-btn" id="withdrawBtn"><i class="fas fa-paper-plane"></i> Request Withdrawal</button>
        
        <div id="statusBox" class="status-box">
            <i class="fas fa-clock"></i>
            <div class="status-text">PENDING</div>
        </div>
        
        <div class="info-box">
            <i class="fas fa-shield-alt"></i> Withdrawals are processed after admin verification.
        </div>
        
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>

<script>
    const API_URL = 'https://algon-flow-market.onrender.com';
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (!token) window.location.href = 'index.html';
    
    let currentBalance = 0;
    let requiredVolume = 0;
    
    async function loadBalance() {
        try {
            const response = await fetch(`${API_URL}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            currentBalance = data.user.balance;
            requiredVolume = currentBalance * 3;
            
            document.getElementById('availableBalance').innerHTML = currentBalance.toFixed(2);
            document.getElementById('requiredMsg').innerHTML = `Need ${requiredVolume.toFixed(2)} USD total activity to withdraw`;
            document.getElementById('ruleText').innerHTML = `You need at least ${requiredVolume.toFixed(2)} USD in total trading volume (3x your balance of ${currentBalance.toFixed(2)} USD) before you can withdraw.`;
        } catch (error) {
            console.error('Error loading balance:', error);
        }
    }
    
    // Check if user meets withdrawal requirement
    async function checkWithdrawalEligibility() {
        try {
            const response = await fetch(`${API_URL}/api/user/can-withdraw`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            return data.canWithdraw;
        } catch (error) {
            return false;
        }
    }
    
    document.getElementById('withdrawAmount').addEventListener('input', function() {
        // Just for display, no fee calculation shown
    });
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('withdrawAmount').value = btn.dataset.amount;
        };
    });
    
    document.getElementById('withdrawBtn').onclick = async () => {
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        const network = document.getElementById('network').value;
        const address = document.getElementById('walletAddress').value;
        const statusBox = document.getElementById('statusBox');
        
        if (!amount || amount < 50) {
            alert('Minimum withdrawal amount is $50 USD');
            return;
        }
        
        if (amount > currentBalance) {
            alert('Insufficient balance');
            return;
        }
        
        if (!address) {
            alert('Please enter your wallet address');
            return;
        }
        
        // Check if user meets the 3x rule
        const canWithdraw = await checkWithdrawalEligibility();
        if (!canWithdraw) {
            alert(`You need ${requiredVolume.toFixed(2)} USD total trading volume (3x your balance) before you can withdraw. Current balance: $${currentBalance.toFixed(2)}`);
            return;
        }
        
        const withdrawBtn = document.getElementById('withdrawBtn');
        withdrawBtn.disabled = true;
        withdrawBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
        
        try {
            const response = await fetch(`${API_URL}/api/withdrawal/request`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ amount, network, address })
            });
            const data = await response.json();
            
            if (data.success) {
                // Show only PENDING status
                statusBox.className = 'status-box pending';
                document.getElementById('withdrawAmount').value = '';
                document.getElementById('walletAddress').value = '';
                loadBalance();
                
                setTimeout(() => {
                    statusBox.style.opacity = '0.5';
                }, 3000);
            } else {
                alert(data.error || 'Withdrawal request failed');
            }
        } catch (error) {
            alert('Error processing request');
        } finally {
            withdrawBtn.disabled = false;
            withdrawBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Withdrawal';
        }
    };
    
    loadBalance();
</script>
</body>
</html>
