<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Algon Flow Market | AI Trading Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #0a0e17;
            color: #e0e3eb;
            overflow-x: hidden;
        }

        /* Enable pinch zoom on mobile */
        html {
            touch-action: pan-x pan-y;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .top-nav {
            background: #0f1322;
            border-bottom: 1px solid #1e2538;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #00c6fb, #005bea);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .market-selector {
            background: #1a1f30;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            background: #1a1f30;
            padding: 5px 10px;
            border-radius: 40px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #8a92b0;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 13px;
        }

        .nav-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #2d3748;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .action-btn.deposit {
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            color: #0a0e17;
        }

        .user-balance {
            background: #1a1f30;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 700;
            color: #2dd4bf;
        }

        .main-trading-area {
            display: flex;
            flex: 1;
            overflow: auto;
            padding: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .left-column {
            flex: 2.5;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chart-container {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            padding: 12px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .price-info {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 24px;
            font-weight: 700;
            color: #00d4aa;
        }

        .price-change {
            font-size: 14px;
        }

        .timeframes {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .timeframe-btn {
            background: #1a1f30;
            border: none;
            color: #8a92b0;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }

        .timeframe-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .tradingview-container {
            flex: 1;
            min-height: 200px;
            border-radius: 8px;
            overflow: hidden;
        }

        .trading-panel {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            padding: 16px;
        }

        .order-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid #1e2538;
            padding-bottom: 12px;
        }

        .order-type {
            flex: 1;
            background: none;
            border: none;
            color: #8a92b0;
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
        }

        .order-type.active {
            background: #2d3748;
            color: white;
        }

        .trade-input {
            background: #1a1f30;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            color: white;
            margin: 8px 0;
        }

        .buy-sell-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 16px 0;
        }

        .buy-btn, .sell-btn {
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 48%;
            font-size: 16px;
        }

        .buy-btn {
            background: #00d4aa;
            color: #0a0e17;
        }

        .sell-btn {
            background: #ff6b6b;
            color: white;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 120px;
        }

        .control-label {
            font-size: 11px;
            color: #8a92b0;
            margin-bottom: 6px;
            display: block;
        }

        .leverage-buttons, .duration-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .leverage-btn, .duration-btn {
            background: #1a1f30;
            border: none;
            color: #8a92b0;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .leverage-btn.active, .duration-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .api-key-section {
            background: #1a1f30;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .api-key-input {
            background: #0f1322;
            border: 1px solid #2dd4bf;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            color: white;
            font-size: 12px;
        }

        .start-ai-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .right-column {
            flex: 1.8;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }

        .markets-container {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            display: flex;
            flex-direction: column;
            max-height: 400px;
            overflow: hidden;
        }

        .markets-header {
            padding: 12px;
            border-bottom: 1px solid #1e2538;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .markets-header h4 {
            font-size: 14px;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2538;
            flex-wrap: wrap;
        }

        .category-btn {
            background: #1a1f30;
            border: none;
            color: #8a92b0;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .category-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .markets-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            max-height: 300px;
        }

        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 4px;
        }

        .market-item:hover {
            background: #1a1f30;
        }

        .market-item.selected {
            background: #2d3748;
            border-left: 3px solid #2dd4bf;
        }

        .market-info {
            display: flex;
            flex-direction: column;
        }

        .market-symbol {
            font-weight: 700;
            font-size: 13px;
        }

        .market-name {
            font-size: 10px;
            color: #8a92b0;
        }

        .market-price-info {
            text-align: right;
        }

        .market-price {
            font-weight: 600;
            font-size: 13px;
        }

        .market-change {
            font-size: 10px;
        }

        .market-change.positive {
            color: #00d4aa;
        }

        .market-change.negative {
            color: #ff6b6b;
        }

        .active-trades-panel, .trade-history-panel {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            padding: 12px;
        }

        .trade-item {
            background: #1a1f30;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .trade-profit {
            color: #00d4aa;
        }

        .trade-loss {
            color: #ff6b6b;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-active {
            background: #2dd4bf20;
            color: #2dd4bf;
        }

        .badge-completed {
            background: #00d4aa20;
            color: #00d4aa;
        }

        .badge-loss {
            background: #ff6b6b20;
            color: #ff6b6b;
        }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f1322;
            border-top: 1px solid #2dd4bf;
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            max-height: 50vh;
            overflow-y: auto;
        }

        .drawer.open {
            transform: translateY(0);
        }

        .drawer-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2dd4bf;
            color: #0a0e17;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(45,212,191,0.3);
        }

        @media (max-width: 768px) {
            .top-nav {
                height: auto;
                padding: 10px;
            }
            .main-trading-area {
                padding: 8px;
            }
            .left-column, .right-column {
                min-width: 100%;
            }
            .chart-container {
                height: 300px;
            }
            .current-price {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-nav">
        <div class="logo-area">
            <div class="logo"><i class="fas fa-chart-line"></i></div>
            <span style="font-weight: 700;">ALGON FLOW</span>
            <span class="market-selector" id="marketSelector">BTC/USD ▼</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" data-page="dashboard">Trade</button>
            <button class="nav-btn" data-page="portfolio">Portfolio</button>
            <button class="nav-btn" data-page="history">History</button>
        </div>
        <div class="action-buttons">
            <button class="action-btn deposit" id="depositBtn"><i class="fas fa-plus-circle"></i> Deposit</button>
            <button class="action-btn" id="withdrawBtn"><i class="fas fa-minus-circle"></i> Withdraw</button>
            <span class="user-balance"><i class="fas fa-wallet"></i> $<span id="userBalance">0</span></span>
        </div>
    </div>

    <div class="main-trading-area">
        <div class="left-column">
            <div class="chart-container">
                <div class="chart-header">
                    <div class="price-info">
                        <div>
                            <div class="current-price" id="currentPrice">$0.00</div>
                            <div class="price-change" id="priceChange">0%</div>
                        </div>
                        <div style="font-size: 12px; color: #8a92b0;">
                            <div>24h High: <span id="high24h">-</span></div>
                            <div>24h Low: <span id="low24h">-</span></div>
                        </div>
                    </div>
                    <div class="timeframes">
                        <button class="timeframe-btn" data-interval="1">1m</button>
                        <button class="timeframe-btn" data-interval="5">5m</button>
                        <button class="timeframe-btn" data-interval="15">15m</button>
                        <button class="timeframe-btn active" data-interval="60">1H</button>
                        <button class="timeframe-btn" data-interval="240">4H</button>
                        <button class="timeframe-btn" data-interval="1D">1D</button>
                        <button class="timeframe-btn" data-interval="1W">1W</button>
                    </div>
                </div>
                <div class="tradingview-container" id="tradingview_chart"></div>
            </div>

            <div class="trading-panel">
                <div class="order-type-tabs">
                    <button class="order-type active" data-order-type="ai">🤖 AI Trading</button>
                    <button class="order-type" data-order-type="manual">📊 Manual</button>
                </div>

                <!-- AI Trading Panel -->
                <div id="aiOrderPanel">
                    <div class="api-key-section">
                        <label style="font-size: 12px; color: #8a92b0;">🔑 AI API Key (Generate from Admin Panel)</label>
                        <input type="text" id="aiApiKey" class="api-key-input" placeholder="Enter your AI API Key">
                        <button class="start-ai-btn" id="saveApiKeyBtn"><i class="fas fa-key"></i> Save API Key</button>
                    </div>

                    <input type="number" id="aiAmount" class="trade-input" placeholder="Investment Amount (USD)" step="100">
                    
                    <div class="controls-row">
                        <div class="control-group">
                            <span class="control-label">📊 Leverage</span>
                            <div class="leverage-buttons">
                                <button class="leverage-btn" data-leverage="1">1x</button>
                                <button class="leverage-btn" data-leverage="5">5x</button>
                                <button class="leverage-btn" data-leverage="10">10x</button>
                                <button class="leverage-btn active" data-leverage="100">100x</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <span class="control-label">⏱️ Duration</span>
                            <div class="duration-buttons">
                                <button class="duration-btn" data-duration="1m" data-ms="60000">1m</button>
                                <button class="duration-btn" data-duration="15m" data-ms="900000">15m</button>
                                <button class="duration-btn active" data-duration="1h" data-ms="3600000">1h</button>
                                <button class="duration-btn" data-duration="4h" data-ms="14400000">4h</button>
                                <button class="duration-btn" data-duration="1d" data-ms="86400000">1d</button>
                                <button class="duration-btn" data-duration="1w" data-ms="604800000">1w</button>
                            </div>
                        </div>
                    </div>

                    <div class="buy-sell-container">
                        <button class="buy-btn" id="startAIBuyBtn"><i class="fas fa-robot"></i> Start AI BUY</button>
                        <button class="sell-btn" id="startAISellBtn"><i class="fas fa-robot"></i> Start AI SELL</button>
                    </div>
                </div>

                <!-- Manual Trading Panel -->
                <div id="manualOrderPanel" style="display: none;">
                    <input type="text" id="manualAmount" class="trade-input" placeholder="Amount (USD)">
                    <div class="buy-sell-container">
                        <button class="buy-btn" id="manualBuyBtn"><i class="fas fa-arrow-up"></i> BUY</button>
                        <button class="sell-btn" id="manualSellBtn"><i class="fas fa-arrow-down"></i> SELL</button>
                    </div>
                </div>

                <div id="tradeMessage" style="margin-top: 10px; font-size: 12px; text-align: center; color: #8a92b0;"></div>
            </div>
        </div>

        <div class="right-column">
            <div id="dashboardPage" class="markets-container">
                <div class="markets-header">
                    <h4><i class="fas fa-globe"></i> Markets</h4>
                    <span style="font-size: 11px; color: #2dd4bf;"><i class="fas fa-chart-line"></i> Top Gainers</span>
                </div>
                <div class="category-tabs">
                    <button class="category-btn active" data-category="crypto">💰 Crypto</button>
                    <button class="category-btn" data-category="commodities">🛢️ Commodities</button>
                    <button class="category-btn" data-category="forex">💱 Forex</button>
                </div>
                <div class="markets-list" id="marketsList"></div>
            </div>

            <div id="portfolioPage" style="display: none;">
                <div class="active-trades-panel">
                    <h4><i class="fas fa-spinner fa-pulse"></i> Active AI Trades</h4>
                    <div id="activeTradesList"></div>
                </div>
            </div>

            <div id="historyPage" style="display: none;">
                <div class="trade-history-panel">
                    <h4><i class="fas fa-history"></i> Trade History</h4>
                    <div id="tradeHistoryList"></div>
                </div>
            </div>

            <div class="ai-banner" style="background: linear-gradient(135deg, #1e3a5f, #0f172a); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #2dd4bf;">
                <i class="fas fa-robot"></i> AI Status: <span id="aiStatus">Ready</span><br>
                <small>Verified: <span id="verifiedStatus">No</span> | Balance: $<span id="aiBalance">0</span></small>
                <div id="aiSignal" style="font-size: 11px; margin-top: 5px;"></div>
            </div>
        </div>
    </div>
</div>

<div class="drawer" id="drawer">

</div>

            { symbol: "AUDJPY", name: "Australian Dollar / Japanese Yen", tradingview: "FX:AUDJPY" },
            { symbol: "CHFJPY", name: "Swiss Franc / Japanese Yen", tradingview: "FX:CHFJPY" },
            { symbol: "EURCHF", name: "Euro / Swiss Franc", tradingview: "FX:EURCHF" },
            { symbol: "GBPCHF", name: "British Pound / Swiss Franc", tradingview: "FX:GBPCHF" },
            { symbol: "USDMXN", name: "US Dollar / Mexican Peso", tradingview: "FX:USDMXN" },
            { symbol: "USDZAR", name: "US Dollar / South African Rand", tradingview: "FX:USDZAR" },
            { symbol: "USDTRY", name: "US Dollar / Turkish Lira", tradingview: "FX:USDTRY" },
            { symbol: "USDSGD", name: "US Dollar / Singapore Dollar", tradingview: "FX:USDSGD" },
            { symbol: "USDHKD", name: "US Dollar / Hong Kong Dollar", tradingview: "FX:USDHKD" }
        ]
    };
    
    function getTradingViewSymbol(symbol, category) {
        if (category === 'crypto') return `BINANCE:${symbol}`;
        const item = marketCategories[category].find(m => m.symbol === symbol);
        return item?.tradingview || `FX:${symbol}`;
    }
    
    async function fetchUserProfile() {
        try {
            const response = await fetch(`${API_URL}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            userData = data.user;
            document.getElementById('userBalance').innerHTML = userData.balance.toFixed(2);
            document.getElementById('aiBalance').innerHTML = userData.balance.toFixed(2);
            document.getElementById('verifiedStatus').innerHTML = userData.isVerified ? '<span style="color:#2dd4bf;">✓ Verified</span>' : '<span style="color:#ff6b6b;">Not Verified</span>';
            
            if (userData.aiApiKey) {
                document.getElementById('aiApiKey').value = userData.aiApiKey;
            }
            
            activeTrades = data.activeTrades || [];
            tradeHistory = data.tradeHistory || [];
            renderActiveTrades();
            renderTradeHistory();
        } catch (error) {
            console.error('Error fetching profile:', error);
        }
    }
    
    async function fetchMarketPrices() {
        const allMarkets = [...marketCategories.crypto, ...marketCategories.commodities, ...marketCategories.forex];
        for (const market of allMarkets) {
            const category = marketCategories.crypto.find(m => m.symbol === market.symbol) ? 'crypto' : 
                            marketCategories.commodities.find(m => m.symbol === market.symbol) ? 'commodities' : 'forex';
            try {
                let price = 0, change = 0;
                if (category === 'crypto') {
                    const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${market.symbol}`);
                    const data = await response.json();
                    price = parseFloat(data.lastPrice);
                    change = parseFloat(data.priceChangePercent);
                } else {
                    price = 100 + Math.random() * 900;
                    change = (Math.random() - 0.5) * 3;
                }
                marketPrices[market.symbol] = { price, change, name: market.name };
            } catch (e) {
                marketPrices[market.symbol] = { price: 100 + Math.random() * 900, change: (Math.random() - 0.5) * 3, name: market.name };
            }
        }
        renderMarketsList();
        updateCurrentMarketDisplay();
        updateDrawerAssets();
    }
    
    function renderMarketsList() {
        const markets = marketCategories[currentCategory];
        const container = document.getElementById("marketsList");
        container.innerHTML = markets.map(m => {
            const priceData = marketPrices[m.symbol] || { price: 0, change: 0 };
            return `
                <div class="market-item ${currentSymbol === m.symbol ? 'selected' : ''}" onclick="switchMarket('${m.symbol}', '${m.name}')">
                    <div class="market-info">
                        <div class="market-symbol">${m.symbol.replace('USDT', '')}/USD</div>
                        <div class="market-name">${m.name}</div>
                    </div>
                    <div class="market-price-info">
                        <div class="market-price">$${priceData.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="market-change ${priceData.change >= 0 ? 'positive' : 'negative'}">${priceData.change >= 0 ? '+' : ''}${priceData.change.toFixed(2)}%</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function updateDrawerAssets() {
        const assets = Object.entries(marketPrices)
            .sort((a, b) => b[1].change - a[1].change)
            .slice(0, 10);
        
        document.getElementById('drawerAssets').innerHTML = assets.map(([symbol, data]) => `
            <div style="display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1e2538;">
                <span><strong>${symbol.replace('USDT', '')}</strong> <small>${data.name}</small></span>
                <span style="color: ${data.change >= 0 ? '#00d4aa' : '#ff6b6b'}">${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%</span>
            </div>
        `).join('');
    }
    
    async function updateCurrentMarketDisplay() {
        const data = marketPrices[currentSymbol];
        if (data) {
            document.getElementById("currentPrice").innerHTML = `$${data.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById("priceChange").innerHTML = `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%`;
            document.getElementById("priceChange").style.color = data.change >= 0 ? '#00d4aa' : '#ff6b6b';
        }
        const displaySymbol = currentSymbol.replace("USDT", "");
        document.getElementById("marketSelector").innerHTML = `${displaySymbol}/USD ▼`;
    }
    
    window.switchMarket = function(symbol, name) {
        currentSymbol = symbol;
        currentSymbolName = name;
        updateCurrentMarketDisplay();
        renderMarketsList();
        loadTradingViewChart();
    };
    
    let currentInterval = "60";
    
    function loadTradingViewChart() {
        const container = document.getElementById("tradingview_chart");
        if (container) container.innerHTML = "";
        const intervalMap = { "1": "1", "5": "5", "15": "15", "60": "60", "240": "240", "1D": "1D", "1W": "1W" };
        
        let category = marketCategories.crypto.find(m => m.symbol === currentSymbol) ? 'crypto' :
                       marketCategories.commodities.find(m => m.symbol === currentSymbol) ? 'commodities' : 'forex';
        let tvSymbol = getTradingViewSymbol(currentSymbol, category);
        
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "width": "100%", "height": "100%", "symbol": tvSymbol,
                "interval": intervalMap[currentInterval] || "60", "timezone": "Etc/UTC",
                "theme": "dark", "style": "1", "locale": "en",
                "toolbar_bg": "#0f1322", "enable_publishing": false,
                "container_id": "tradingview_chart"
            });
        }
    }
    
    async function saveApiKey() {
        const apiKey = document.getElementById('aiApiKey').value;
        if (!apiKey) {
            showMessage('Please enter an API Key', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/ai/set-api-key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ apiKey })
            });
            const data = await response.json();
            if (data.success) {
                showMessage('API Key saved successfully!', 'success');
                fetchUserProfile();
            } else {
                showMessage(data.error, 'error');
            }
        } catch (error) {
            showMessage('Error saving API Key', 'error');
        }
    }
    
    async function startAITrade(side) {
        const amount = parseFloat(document.getElementById('aiAmount').value);
        const apiKey = document.getElementById('aiApiKey').value;
        
        if (!userData?.isVerified && userData?.balance < 115) {
            showMessage('Need minimum $115 balance or verified status to use AI trading. Please deposit funds.', 'error');
            return;
        }
        
        if (!amount || amount < 80) {
            showMessage('Minimum investment is $80 USD', 'error');
            return;
        }
        
        if (amount > userData?.balance) {
            showMessage('Insufficient balance', 'error');
            return;
        }
        
        if (!apiKey) {
            showMessage('Please save your AI API Key first', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/ai/start-trade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    symbol: currentSymbol,
                    symbolName: currentSymbolName,
                    category: currentCategory,
                    amount: amount,
                    leverage: currentLeverage,
                    duration: currentDuration,
                    durationMs: currentDurationMs,
                    apiKey: apiKey
                })
            });
            const data = await response.json();
            if (data.success) {
                showMessage(`AI ${side.toUpperCase()} trade started! Analysis: ${data.analysis.analysis}`, 'success');
                document.getElementById('aiAmount').value = '';
                fetchUserProfile();
                setTimeout(() => fetchUserProfile(), 5000);
            } else {
                showMessage(data.error, 'error');
            }
        } catch (error) {
            showMessage('Error starting AI trade', 'error');
        }
    }
    
    function renderActiveTrades() {
        const container = document.getElementById('activeTradesList');
        if (!activeTrades || activeTrades.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: #8a92b0;">No active trades</div>';
            return;
        }
        
        container.innerHTML = activeTrades.map(trade => `
            <div class="trade-item">
                <div style="display: flex; justify-content: space-between;">
                    <span><strong>${trade.symbolName}</strong> <span class="badge badge-active">${trade.side.toUpperCase()}</span></span>
                    <span>$${trade.amount.toFixed(2)} @ ${trade.leverage}x</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px;">
                    <span>Duration: ${trade.duration}</span>
                    <span>Entry: $${trade.entryPrice?.toFixed(2) || '--'}</span>
                    <button onclick="stopTrade('${trade._id}')" style="background: #ff6b6b; border: none; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer;">Stop</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderTradeHistory() {
        const container = document.getElementById('tradeHistoryList');
        if (!tradeHistory || tradeHistory.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: #8a92b0;">No trade history</div>';
            return;
        }
        
        container.innerHTML = tradeHistory.map(trade => `
            <div class="trade-item">
                <div style="display: flex; justify-content: space-between;">
                    <span><strong>${trade.symbolName}</strong> <span class="badge ${trade.status === 'completed' ? 'badge-completed' : 'badge-loss'}">${trade.status}</span></span>
                    <span class="${trade.profit >= 0 ? 'trade-profit' : 'trade-loss'}">${trade.profit >= 0 ? '+' : ''}$${trade.profit?.toFixed(2) || '0'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #8a92b0;">
                    <span>${trade.duration}</span>
                    <span>${new Date(trade.endedAt).toLocaleString()}</span>
                </div>
            </div>
        `).join('');
    }
    
    async function stopTrade(tradeId) {
        try {
            const response = await fetch(`${API_URL}/api/ai/stop-trade/${tradeId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success) {
                showMessage('Trade stopped successfully', 'success');
                fetchUserProfile();
            }
        } catch (error) {
            showMessage('Error stopping trade', 'error');
        }
    }
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('tradeMessage');
        msgDiv.innerHTML = msg;
        msgDiv.style.color = type === 'error' ? '#ff6b6b' : '#2dd4bf';
        setTimeout(() => msgDiv.innerHTML = '', 5000);
    }
    
    // Navigation
    document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            let page = btn.dataset.page;
            document.getElementById("dashboardPage").style.display = page === "dashboard" ? "flex" : "none";
            document.getElementById("portfolioPage").style.display = page === "portfolio" ? "block" : "none";
            document.getElementById("historyPage").style.display = page === "history" ? "block" : "none";
        };
    });
    
    document.querySelectorAll(".category-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.category;
            renderMarketsList();
        };
    });
    
    document.querySelectorAll(".order-type").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".order-type").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentOrderType = btn.dataset.orderType;
            document.getElementById("aiOrderPanel").style.display = currentOrderType === "ai" ? "block" : "none";
            document.getElementById("manualOrderPanel").style.display = currentOrderType === "manual" ? "block" : "none";
        };
    });
    
    document.querySelectorAll(".leverage-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".leverage-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentLeverage = parseInt(btn.dataset.leverage);
        };
    });
    
    document.querySelectorAll(".duration-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".duration-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentDuration = btn.dataset.duration;
            currentDurationMs = parseInt(btn.dataset.ms);
        };
    });
    
    document.querySelectorAll(".timeframe-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".timeframe-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentInterval = btn.dataset.interval;
            loadTradingViewChart();
        };
    });
    
    document.getElementById("saveApiKeyBtn").onclick = saveApiKey;
    document.getElementById("startAIBuyBtn").onclick = () => startAITrade('buy');
    document.getElementById("startAISellBtn").onclick = () => startAITrade('sell');
    document.getElementById("depositBtn").onclick = () => window.location.href = 'deposit.html';
    document.getElementById("withdrawBtn").onclick = () => window.location.href = 'withdraw.html';
    
    // Drawer toggle
    document.getElementById("drawerToggle").onclick = () => {
        document.getElementById("drawer").classList.toggle("open");
    };
    
    // Load TradingView
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/tv.js';
    script.onload = () => loadTradingViewChart();
    document.head.appendChild(script);
    
    // Initialize
    fetchUserProfile();
    fetchMarketPrices();
    setInterval(() => {
        fetchMarketPrices();
        fetchUserProfile();
    }, 30000);
</script>
</body>
</html>
