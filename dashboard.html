<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | LazerMarkets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #e0e0e0; overflow-x: hidden; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,255,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,0,0.02) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; }
        .app-container { position: relative; z-index: 1; display: flex; height: 100vh; flex-direction: column; }
        .top-nav { background: #0f0f0f; border-bottom: 1px solid #1a1a1a; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo { width: 35px; height: 35px; background: linear-gradient(135deg, #00cc00, #008800); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .market-selector { background: #1a1a1a; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #333; }
        .nav-buttons { display: flex; gap: 8px; background: #1a1a1a; padding: 5px 10px; border-radius: 40px; }
        .nav-btn { background: none; border: none; color: #888; padding: 5px 14px; border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 13px; }
        .nav-btn.active { background: #00cc00; color: #0a0a0a; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .action-btn.deposit { background: linear-gradient(135deg, #00cc00, #008800); color: #0a0a0a; border: none; }
        .user-balance { background: #1a1a1a; padding: 6px 15px; border-radius: 20px; font-weight: 700; color: #00cc00; border: 1px solid #333; }
        .main-trading-area { display: flex; flex: 1; overflow: auto; padding: 12px; gap: 12px; flex-wrap: wrap; }
        .left-column { flex: 2.5; min-width: 300px; display: flex; flex-direction: column; gap: 12px; }
        .chart-container { background: #0f0f0f; border-radius: 12px; border: 1px solid #1a1a1a; padding: 12px; height: 450px; display: flex; flex-direction: column; }
        .chart-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; }
        .price-info { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
        .current-price { font-size: 24px; font-weight: 700; color: #00cc00; }
        .price-change { font-size: 14px; }
        .positive { color: #00cc00; }
        .negative { color: #ff4444; }
        .trading-panel { background: #0f0f0f; border-radius: 12px; border: 1px solid #1a1a1a; padding: 16px; }
        .api-key-section { background: #1a1a1a; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: none; border: 1px solid #00cc00; }
        .api-key-section.visible { display: block; }
        .no-balance-warning { background: rgba(255,68,68,0.15); border: 1px solid #ff4444; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 16px; display: none; }
        .api-key-input { background: #0a0a0a; border: 1px solid #00cc00; border-radius: 8px; padding: 10px; width: 100%; color: white; font-size: 14px; font-family: monospace; }
        .key-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .save-key-btn { background: #00cc00; border: none; color: #0a0a0a; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; flex: 1; }
        .delete-key-btn { background: #ff4444; border: none; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; flex: 1; }
        .trade-input { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; width: 100%; color: white; margin: 8px 0; font-size: 16px; }
        .controls-row { display: flex; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
        .control-group { flex: 1; min-width: 120px; }
        .control-label { font-size: 11px; color: #888; margin-bottom: 6px; display: block; }
        .leverage-buttons, .duration-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .leverage-btn, .duration-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .leverage-btn.active, .duration-btn.active { background: #00cc00; color: #0a0a0a; border-color: #00cc00; }
        .start-ai-btn { background: linear-gradient(135deg, #00cc00, #008800); border: none; color: #0a0a0a; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 12px; font-size: 16px; }
        .right-column { flex: 1.8; min-width: 280px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: calc(100vh - 80px); }
        .markets-container { background: #0f0f0f; border-radius: 12px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; max-height: 500px; overflow: hidden; }
        .markets-header { padding: 12px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .category-tabs { display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; flex-wrap: wrap; }
        .category-btn { background: #1a1a1a; border: none; color: #888; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .category-btn.active { background: #00cc00; color: #0a0a0a; }
        .markets-list { flex: 1; overflow-y: auto; padding: 8px; max-height: 400px; }
        .market-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; margin-bottom: 4px; }
        .market-item:hover { background: #1a1a1a; }
        .market-item.selected { background: #1a1a1a; border-left: 3px solid #00cc00; }
        .market-symbol { font-weight: 700; font-size: 13px; }
        .market-name { font-size: 10px; color: #888; }
        .market-price { font-weight: 600; font-size: 13px; }
        .active-trades-panel, .trade-history-panel { background: #0f0f0f; border-radius: 12px; border: 1px solid #1a1a1a; padding: 12px; }
        .trade-item { background: #1a1a1a; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        .trade-profit { color: #00cc00; }
        .trade-loss { color: #ff4444; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        .badge-active { background: #00cc0020; color: #00cc00; }
        .ai-analysis { background: linear-gradient(135deg, #0a2a0a, #0a0a0a); border-radius: 12px; padding: 12px; font-size: 11px; margin-top: 12px; border: 1px solid #00cc00; display: none; }
        @media (max-width: 768px) { .top-nav { height: auto; padding: 10px; } .main-trading-area { padding: 8px; } .left-column, .right-column { min-width: 100%; } .chart-container { height: 350px; } }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="app-container">
    <div class="top-nav">
        <div class="logo-area"><div class="logo"><i class="fas fa-bolt"></i></div><span style="font-weight: 700;">LAZERMARKETS</span><span class="market-selector" id="marketSelector">BTC/USD ▼</span></div>
        <div class="nav-buttons"><button class="nav-btn active" data-page="dashboard">Trade</button><button class="nav-btn" data-page="portfolio">Portfolio</button><button class="nav-btn" data-page="history">History</button><button class="nav-btn" data-page="profile">Profile</button></div>
        <div class="action-buttons"><button class="action-btn deposit" id="depositBtn"><i class="fas fa-plus-circle"></i> Deposit</button><button class="action-btn" id="withdrawBtn"><i class="fas fa-minus-circle"></i> Withdraw</button><span class="user-balance"><i class="fas fa-wallet"></i> $<span id="userBalance">0</span></span></div>
    </div>
    <div class="main-trading-area">
        <div class="left-column">
            <div class="chart-container"><div class="chart-header"><div class="price-info"><div><div class="current-price" id="currentPrice">$0.00</div><div class="price-change" id="priceChange">0%</div></div><div style="font-size: 12px; color: #888;"><div>24h High: <span id="high24h">-</span></div><div>24h Low: <span id="low24h">-</span></div></div></div></div><div id="simpleChart" style="height: 350px; background: #0a0a0a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #888;"><i class="fas fa-chart-line"></i> Chart Loading...</div></div>
            <div class="trading-panel">
                <div id="noBalanceWarning" class="no-balance-warning"><i class="fas fa-exclamation-triangle"></i><h4>Insufficient Balance for AI Trading</h4><p>You need at least <strong>$60 USD</strong> to start AI trading. Current balance: $<span id="warningBalance">0</span></p><button class="deposit-now-btn" onclick="window.location.href='deposit.html'" style="background:#00cc00; border:none; padding:10px 20px; border-radius:8px; margin-top:10px; cursor:pointer;">Deposit Now</button></div>
                <div id="apiKeySection" class="api-key-section"><label style="font-size:12px; color:#888;">🔑 AI Passkey</label><input type="password" id="aiPasskey" class="api-key-input" placeholder="Enter your 12-digit AI Passkey"><div class="key-buttons"><button class="save-key-btn" id="savePasskeyBtn"><i class="fas fa-save"></i> Save</button><button class="delete-key-btn" id="deletePasskeyBtn"><i class="fas fa-trash"></i> Delete</button></div><div id="passkeyStatus" style="font-size:11px; margin-top:5px; color:#00cc00;"></div></div>
                <input type="number" id="aiAmount" class="trade-input" placeholder="Investment Amount (USD) - Minimum $115" step="10">
                <div class="controls-row"><div class="control-group"><span class="control-label">📊 Leverage</span><div class="leverage-buttons"><button class="leverage-btn" data-leverage="1">1x</button><button class="leverage-btn" data-leverage="5">5x</button><button class="leverage-btn" data-leverage="10">10x</button><button class="leverage-btn active" data-leverage="100">100x</button></div></div><div class="control-group"><span class="control-label">⏱️ Duration</span><div class="duration-buttons"><button class="duration-btn" data-duration="3m" data-ms="180000">3m</button><button class="duration-btn" data-duration="5m" data-ms="300000">5m</button><button class="duration-btn" data-duration="15m" data-ms="900000">15m</button><button class="duration-btn" data-duration="30m" data-ms="1800000">30m</button><button class="duration-btn active" data-duration="1h" data-ms="3600000">1h</button><button class="duration-btn" data-duration="4h" data-ms="14400000">4h</button><button class="duration-btn" data-duration="1d" data-ms="86400000">1d</button></div></div></div>
                <button class="start-ai-btn" id="startAIBtn"><i class="fas fa-robot"></i> Start AI Trading</button>
                <div id="aiAnalysis" class="ai-analysis"><h4><i class="fas fa-brain"></i> AI Analysis</h4><div id="analysisContent"></div></div>
                <div id="tradeMessage" style="margin-top:10px; font-size:12px; text-align:center; color:#888;"></div>
            </div>
        </div>
        <div class="right-column">
            <div id="dashboardPage" class="markets-container"><div class="markets-header"><h4><i class="fas fa-globe"></i> Markets</h4></div><div class="category-tabs"><button class="category-btn active" data-category="crypto">💰 Crypto</button><button class="category-btn" data-category="forex">💱 Forex</button><button class="category-btn" data-category="indices">📈 Indices</button><button class="category-btn" data-category="commodities">🛢️ Commodities</button></div><div class="markets-list" id="marketsList"></div></div>
            <div id="portfolioPage" style="display:none;"><div class="active-trades-panel"><h4><i class="fas fa-spinner fa-pulse"></i> Active AI Trades</h4><div id="activeTradesList"></div></div></div>
            <div id="historyPage" style="display:none;"><div class="trade-history-panel"><h4><i class="fas fa-history"></i> Trade History</h4><div id="tradeHistoryList"></div></div></div>
        </div>
    </div>
</div>
<script>
    const API_URL = 'https://lazermarkets.onrender.com';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';
    let currentSymbol = "BTCUSDT", currentSymbolName = "Bitcoin", currentCategory = "crypto", currentLeverage = 100, currentDuration = "1h", currentDurationMs = 3600000;
    let marketPrices = {}, userData = null, activeTrades = [], tradeHistory = [];
    const marketCategories = { crypto: [{ symbol: "BTCUSDT", name: "Bitcoin" }, { symbol: "ETHUSDT", name: "Ethereum" }, { symbol: "BNBUSDT", name: "Binance Coin" }, { symbol: "SOLUSDT", name: "Solana" }, { symbol: "XRPUSDT", name: "Ripple" }, { symbol: "DOGEUSDT", name: "Dogecoin" }], forex: [{ symbol: "EURUSD", name: "Euro/USD" }, { symbol: "GBPUSD", name: "GBP/USD" }, { symbol: "USDJPY", name: "USD/JPY" }], indices: [{ symbol: "US100", name: "Nasdaq" }, { symbol: "US30", name: "Dow Jones" }, { symbol: "US500", name: "S&P 500" }], commodities: [{ symbol: "XAUUSD", name: "Gold" }, { symbol: "XAGUSD", name: "Silver" }, { symbol: "USOIL", name: "Crude Oil" }] };
    function updateUIForBalance(balance) { const hasEnough = balance >= 60; document.getElementById('apiKeySection').classList.toggle('visible', hasEnough); document.getElementById('noBalanceWarning').style.display = hasEnough ? 'none' : 'block'; document.getElementById('warningBalance').innerHTML = balance.toFixed(2); document.getElementById('aiAmount').disabled = !hasEnough; document.getElementById('startAIBtn').disabled = !hasEnough; }
    async function fetchUserProfile() { try { const res = await fetch(`${API_URL}/api/user/profile`, { headers: { 'Authorization': `Bearer ${token}` } }); const data = await res.json(); userData = data.user; document.getElementById('userBalance').innerHTML = userData.balance.toFixed(2); updateUIForBalance(userData.balance); if (userData.aiApiKey && userData.balance >= 60) { document.getElementById('aiPasskey').value = userData.aiApiKey; document.getElementById('passkeyStatus').innerHTML = '<i class="fas fa-check-circle"></i> Passkey set'; } activeTrades = data.activeTrades || []; tradeHistory = data.tradeHistory || []; renderActiveTrades(); renderTradeHistory(); } catch(e) { console.error(e); } }
    async function fetchMarketPrices() { for (const cat in marketCategories) { for (const m of marketCategories[cat]) { try { let price = 50000, change = 0; if (cat === 'crypto') { const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${m.symbol}`); const d = await res.json(); price = parseFloat(d.lastPrice); change = parseFloat(d.priceChangePercent); } else { price = cat === 'forex' ? 1.05 + Math.random() * 0.5 : (cat === 'indices' ? 15000 + Math.random() * 20000 : 100 + Math.random() * 900); change = (Math.random() - 0.5) * 2; } marketPrices[m.symbol] = { price, change, name: m.name }; } catch(e) { marketPrices[m.symbol] = { price: 50000, change: 0, name: m.name }; } } } renderMarketsList(); updateCurrentMarketDisplay(); }
    function renderMarketsList() { const markets = marketCategories[currentCategory]; const container = document.getElementById("marketsList"); if (!container) return; container.innerHTML = markets.map(m => { const p = marketPrices[m.symbol] || { price: 0, change: 0 }; return `<div class="market-item ${currentSymbol === m.symbol ? 'selected' : ''}" onclick="switchMarket('${m.symbol}', '${m.name}')"><div class="market-info"><div class="market-symbol">${m.symbol.replace('USDT', '')}</div><div class="market-name">${m.name}</div></div><div class="market-price-info"><div class="market-price">$${p.price.toLocaleString(undefined, {minimumFractionDigits:2})}</div><div class="market-change ${p.change >= 0 ? 'positive' : 'negative'}">${p.change >= 0 ? '+' : ''}${p.change.toFixed(2)}%</div></div></div>`; }).join(''); }
    function updateCurrentMarketDisplay() { const data = marketPrices[currentSymbol]; if (data) { document.getElementById("currentPrice").innerHTML = `$${data.price.toLocaleString(undefined, {minimumFractionDigits:2})}`; document.getElementById("priceChange").innerHTML = `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%`; document.getElementById("priceChange").style.color = data.change >= 0 ? '#00cc00' : '#ff4444'; } document.getElementById("marketSelector").innerHTML = `${currentSymbol.replace('USDT', '').replace('USD', '')}/USD ▼`; }
    window.switchMarket = function(symbol, name) { currentSymbol = symbol; currentSymbolName = name; updateCurrentMarketDisplay(); renderMarketsList(); };
    async function savePasskey() { if ((userData?.balance || 0) < 60) { showMessage('Need $60 balance to set passkey', 'error'); return; } const passkey = document.getElementById('aiPasskey').value; if (!passkey) { showMessage('Enter passkey', 'error'); return; } try { const res = await fetch(`${API_URL}/api/ai/save-passkey`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ passkey }) }); const data = await res.json(); if (data.success) { showMessage('Passkey saved!', 'success'); document.getElementById('passkeyStatus').innerHTML = '<i class="fas fa-check-circle"></i> Passkey set'; fetchUserProfile(); } else showMessage(data.error, 'error'); } catch(e) { showMessage('Error saving passkey', 'error'); } }
    async function deletePasskey() { if (!confirm('Delete passkey?')) return; try { const res = await fetch(`${API_URL}/api/ai/delete-passkey`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); const data = await res.json(); if (data.success) { showMessage('Passkey deleted', 'success'); document.getElementById('aiPasskey').value = ''; document.getElementById('passkeyStatus').innerHTML = ''; fetchUserProfile(); } } catch(e) { showMessage('Error', 'error'); } }
    async function startAITrade() { const balance = userData?.balance || 0; if (balance < 60) { showMessage('Need $60 balance', 'error'); return; } const amount = parseFloat(document.getElementById('aiAmount').value); const passkey = document.getElementById('aiPasskey').value; if (!amount || amount < 115) { showMessage('Minimum $115', 'error'); return; } if (amount > balance) { showMessage(`Insufficient balance: $${balance.toFixed(2)}`, 'error'); return; } if (!passkey) { showMessage('Save passkey first', 'error'); return; } document.getElementById('aiAnalysis').style.display = 'block'; document.getElementById('analysisContent').innerHTML = '<div style="text-align:center;"><i class="fas fa-spinner fa-pulse"></i> Analyzing...</div>'; try { const res = await fetch(`${API_URL}/api/ai/start-trade`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ symbol: currentSymbol, symbolName: currentSymbolName, category: currentCategory, amount, leverage: currentLeverage, duration: currentDuration, durationMs: currentDurationMs, passkey }) }); const data = await res.json(); if (data.success) { document.getElementById('analysisContent').innerHTML = `<div><strong>Decision:</strong> <span style="color:#00cc00;">${data.analysis.decision.toUpperCase()}</span> with ${data.analysis.confidence}% confidence</div><div>Entry: $${data.analysis.entryPrice.toLocaleString()}</div>`; showMessage('AI Trade Started!', 'success'); document.getElementById('aiAmount').value = ''; fetchUserProfile(); setTimeout(() => fetchUserProfile(), 5000); } else { showMessage(data.error, 'error'); document.getElementById('aiAnalysis').style.display = 'none'; } } catch(e) { showMessage('Error starting trade', 'error'); document.getElementById('aiAnalysis').style.display = 'none'; } }
    function renderActiveTrades() { const container = document.getElementById('activeTradesList'); if (!activeTrades || activeTrades.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No active trades</div>'; return; } container.innerHTML = activeTrades.map(t => `<div class="trade-item"><div><strong>${t.symbolName}</strong> <span class="badge badge-active">${t.side.toUpperCase()}</span> <span style="float:right;">$${t.amount} @ ${t.leverage}x</span></div><div style="margin-top:8px; font-size:12px;"><span>Entry: $${t.entryPrice?.toFixed(2)}</span><button onclick="stopTrade('${t._id}')" style="float:right; background:#ff4444; border:none; color:white; padding:2px 8px; border-radius:4px; cursor:pointer;">Stop</button></div></div>`).join(''); }
    function renderTradeHistory() { const container = document.getElementById('tradeHistoryList'); if (!tradeHistory || tradeHistory.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No trade history</div>'; return; } container.innerHTML = tradeHistory.slice(0,20).map(t => `<div class="trade-item"><div><strong>${t.symbolName}</strong> <span class="badge ${t.profit >= 0 ? 'badge-active' : ''}" style="${t.profit < 0 ? 'background:#ff444420; color:#ff4444;' : ''}">${t.status}</span><span style="float:right;" class="${t.profit >= 0 ? 'trade-profit' : 'trade-loss'}">${t.profit >= 0 ? '+' : ''}$${t.profit?.toFixed(2) || '0'}</span></div><div style="font-size:11px; color:#888; margin-top:5px;">Amount: $${t.amount} | Duration: ${t.duration} | ${new Date(t.endedAt || t.startedAt).toLocaleString()}</div></div>`).join(''); }
    window.stopTrade = async function(tradeId) { try { const res = await fetch(`${API_URL}/api/ai/stop-trade/${tradeId}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); const data = await res.json(); if (data.success) { showMessage(`Trade stopped. P/L: $${data.profit?.toFixed(2)}`, 'success'); fetchUserProfile(); } } catch(e) { showMessage('Error stopping trade', 'error'); } };
    function showMessage(msg, type) { const div = document.getElementById('tradeMessage'); div.innerHTML = msg; div.style.color = type === 'error' ? '#ff4444' : '#00cc00'; setTimeout(() => div.innerHTML = '', 4000); }
    document.querySelectorAll(".nav-btn").forEach(btn => { btn.onclick = () => { document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); const page = btn.dataset.page; if (page === 'profile') { window.location.href = 'profile.html'; return; } document.getElementById("dashboardPage").style.display = page === "dashboard" ? "flex" : "none"; document.getElementById("portfolioPage").style.display = page === "portfolio" ? "block" : "none"; document.getElementById("historyPage").style.display = page === "history" ? "block" : "none"; }; });
    document.querySelectorAll(".category-btn").forEach(btn => { btn.onclick = () => { document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentCategory = btn.dataset.category; renderMarketsList(); }; });
    document.querySelectorAll(".leverage-btn").forEach(btn => { btn.onclick = () => { document.querySelectorAll(".leverage-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentLeverage = parseInt(btn.dataset.leverage); }; });
    document.querySelectorAll(".duration-btn").forEach(btn => { btn.onclick = () => { document.querySelectorAll(".duration-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); currentDuration = btn.dataset.duration; currentDurationMs = parseInt(btn.dataset.ms); }; });
    document.getElementById("savePasskeyBtn").onclick = savePasskey; document.getElementById("deletePasskeyBtn").onclick = deletePasskey; document.getElementById("startAIBtn").onclick = startAITrade; document.getElementById("depositBtn").onclick = () => window.location.href = 'deposit.html'; document.getElementById("withdrawBtn").onclick = () => window.location.href = 'withdraw.html';
    fetchUserProfile(); fetchMarketPrices(); setInterval(() => { fetchMarketPrices(); fetchUserProfile(); }, 30000);
</script>
</body>
</html>
