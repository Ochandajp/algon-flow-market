<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | Algon Flow Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0e17;
            color: #e0e3eb;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .top-nav {
            background: #0f1322;
            border-bottom: 1px solid #1e2538;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .market-selector {
            background: #1a1f30;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            background: #1a1f30;
            padding: 5px 10px;
            border-radius: 40px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #8a92b0;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 13px;
        }

        .nav-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #2d3748;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .action-btn.deposit {
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            color: #0a0e17;
        }

        .user-balance {
            background: #1a1f30;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 700;
            color: #2dd4bf;
        }

        .main-trading-area {
            display: flex;
            flex: 1;
            overflow: auto;
            padding: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .left-column {
            flex: 2.5;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chart-container {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            padding: 12px;
            height: 450px;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .price-info {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 24px;
            font-weight: 700;
            color: #00d4aa;
        }

        .price-change {
            font-size: 14px;
        }

        .tradingview-container {
            flex: 1;
            min-height: 300px;
            border-radius: 8px;
            overflow: hidden;
        }

        .trading-panel {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            padding: 16px;
        }

        .api-key-section {
            background: #1a1f30;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .api-key-input {
            background: #0f1322;
            border: 1px solid #2dd4bf;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            color: white;
            font-size: 14px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .key-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .save-key-btn {
            background: #2dd4bf;
            border: none;
            color: #0a0e17;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .delete-key-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .trade-input {
            background: #1a1f30;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            color: white;
            margin: 8px 0;
            font-size: 16px;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 120px;
        }

        .control-label {
            font-size: 11px;
            color: #8a92b0;
            margin-bottom: 6px;
            display: block;
        }

        .leverage-buttons, .duration-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .leverage-btn, .duration-btn {
            background: #1a1f30;
            border: none;
            color: #8a92b0;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .leverage-btn.active, .duration-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .start-ai-btn {
            background: linear-gradient(135deg, #2dd4bf, #00c6fb);
            border: none;
            color: #0a0e17;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-size: 16px;
        }

        .right-column {
            flex: 1.8;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }

        .markets-container {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            display: flex;
            flex-direction: column;
            max-height: 400px;
            overflow: hidden;
        }

        .markets-header {
            padding: 12px;
            border-bottom: 1px solid #1e2538;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .markets-header h4 {
            font-size: 14px;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #1e2538;
            flex-wrap: wrap;
        }

        .category-btn {
            background: #1a1f30;
            border: none;
            color: #8a92b0;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .category-btn.active {
            background: #2dd4bf;
            color: #0a0e17;
        }

        .markets-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            max-height: 300px;
        }

        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 4px;
        }

        .market-item:hover {
            background: #1a1f30;
        }

        .market-item.selected {
            background: #2d3748;
            border-left: 3px solid #2dd4bf;
        }

        .market-info {
            display: flex;
            flex-direction: column;
        }

        .market-symbol {
            font-weight: 700;
            font-size: 13px;
        }

        .market-name {
            font-size: 10px;
            color: #8a92b0;
        }

        .market-price-info {
            text-align: right;
        }

        .market-price {
            font-weight: 600;
            font-size: 13px;
        }

        .market-change {
            font-size: 10px;
        }

        .market-change.positive {
            color: #00d4aa;
        }

        .market-change.negative {
            color: #ff6b6b;
        }

        .active-trades-panel, .trade-history-panel {
            background: #0f1322;
            border-radius: 12px;
            border: 1px solid #1e2538;
            padding: 12px;
        }

        .trade-item {
            background: #1a1f30;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .trade-profit {
            color: #00d4aa;
        }

        .trade-loss {
            color: #ff6b6b;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-active {
            background: #2dd4bf20;
            color: #2dd4bf;
        }

        .badge-completed {
            background: #00d4aa20;
            color: #00d4aa;
        }

        .badge-loss {
            background: #ff6b6b20;
            color: #ff6b6b;
        }

        .ai-analysis {
            background: linear-gradient(135deg, #1e3a5f, #0f172a);
            border-radius: 12px;
            padding: 12px;
            font-size: 11px;
            margin-top: 12px;
            border: 1px solid #2dd4bf;
            display: none;
        }

        .ai-analysis h4 {
            color: #2dd4bf;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .analysis-line {
            padding: 3px 0;
            color: #8a92b0;
        }

        .signal-badge {
            display: inline-block;
            background: #2dd4bf20;
            color: #2dd4bf;
            padding: 2px 8px;
            border-radius: 12px;
            margin: 2px;
            font-size: 10px;
        }

        .passkey-status {
            font-size: 11px;
            margin-top: 5px;
            color: #2dd4bf;
        }

        @media (max-width: 768px) {
            .top-nav {
                height: auto;
                padding: 10px;
            }
            .main-trading-area {
                padding: 8px;
            }
            .left-column, .right-column {
                min-width: 100%;
            }
            .chart-container {
                height: 350px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-nav">
        <div class="logo-area">
            <div class="logo"><i class="fas fa-chart-line"></i></div>
            <span style="font-weight: 700;">ALGON FLOW</span>
            <span class="market-selector" id="marketSelector">BTC/USD ▼</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" data-page="dashboard">Trade</button>
            <button class="nav-btn" data-page="portfolio">Portfolio</button>
            <button class="nav-btn" data-page="history">History</button>
            <button class="nav-btn" data-page="profile">Profile</button>
        </div>
        <div class="action-buttons">
            <button class="action-btn deposit" id="depositBtn"><i class="fas fa-plus-circle"></i> Deposit</button>
            <button class="action-btn" id="withdrawBtn"><i class="fas fa-minus-circle"></i> Withdraw</button>
            <span class="user-balance"><i class="fas fa-wallet"></i> $<span id="userBalance">0</span></span>
        </div>
    </div>

    <div class="main-trading-area">
        <div class="left-column">
            <div class="chart-container">
                <div class="chart-header">
                    <div class="price-info">
                        <div>
                            <div class="current-price" id="currentPrice">$0.00</div>
                            <div class="price-change" id="priceChange">0%</div>
                        </div>
                        <div style="font-size: 12px; color: #8a92b0;">
                            <div>24h High: <span id="high24h">-</span></div>
                            <div>24h Low: <span id="low24h">-</span></div>
                        </div>
                    </div>
                </div>
                <div class="tradingview-container" id="tradingview_chart"></div>
            </div>

            <div class="trading-panel">
                <div class="api-key-section">
                    <label style="font-size: 12px; color: #8a92b0;">🔑 AI Passkey (Get from Admin)</label>
                    <input type="password" id="aiPasskey" class="api-key-input" placeholder="Enter your 12-digit AI Passkey">
                    <div class="key-buttons">
                        <button class="save-key-btn" id="savePasskeyBtn"><i class="fas fa-save"></i> Save</button>
                        <button class="delete-key-btn" id="deletePasskeyBtn"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                    <div id="passkeyStatus" class="passkey-status"></div>
                </div>

                <input type="number" id="aiAmount" class="trade-input" placeholder="Investment Amount (USD) - Minimum $115" step="10">
                
                <div class="controls-row">
                    <div class="control-group">
                        <span class="control-label">📊 Leverage</span>
                        <div class="leverage-buttons">
                            <button class="leverage-btn" data-leverage="1">1x</button>
                            <button class="leverage-btn" data-leverage="5">5x</button>
                            <button class="leverage-btn" data-leverage="10">10x</button>
                            <button class="leverage-btn active" data-leverage="100">100x</button>
                        </div>
                    </div>
                    <div class="control-group">
                        <span class="control-label">⏱️ Duration</span>
                        <div class="duration-buttons">
                            <button class="duration-btn" data-duration="1m" data-ms="60000">1m</button>
                            <button class="duration-btn" data-duration="15m" data-ms="900000">15m</button>
                            <button class="duration-btn active" data-duration="1h" data-ms="3600000">1h</button>
                            <button class="duration-btn" data-duration="4h" data-ms="14400000">4h</button>
                            <button class="duration-btn" data-duration="1d" data-ms="86400000">1d</button>
                            <button class="duration-btn" data-duration="1w" data-ms="604800000">1w</button>
                        </div>
                    </div>
                </div>

                <button class="start-ai-btn" id="startAIBuyBtn"><i class="fas fa-robot"></i> Start AI Trading</button>
                
                <div id="aiAnalysis" class="ai-analysis">
                    <h4><i class="fas fa-brain"></i> AI Market Analysis</h4>
                    <div id="analysisContent"></div>
                </div>

                <div id="tradeMessage" style="margin-top: 10px; font-size: 12px; text-align: center; color: #8a92b0;"></div>
            </div>
        </div>

        <div class="right-column">
            <div id="dashboardPage" class="markets-container">
                <div class="markets-header">
                    <h4><i class="fas fa-globe"></i> Markets</h4>
                    <span style="font-size: 11px; color: #2dd4bf;"><i class="fas fa-chart-line"></i> Click to select</span>
                </div>
                <div class="category-tabs">
                    <button class="category-btn active" data-category="crypto">💰 Crypto</button>
                    <button class="category-btn" data-category="commodities">🛢️ Commodities</button>
                    <button class="category-btn" data-category="forex">💱 Forex</button>
                </div>
                <div class="markets-list" id="marketsList"></div>
            </div>

            <div id="portfolioPage" style="display: none;">
                <div class="active-trades-panel">
                    <h4><i class="fas fa-spinner fa-pulse"></i> Active AI Trades</h4>
                    <div id="activeTradesList"></div>
                </div>
            </div>

            <div id="historyPage" style="display: none;">
                <div class="trade-history-panel">
                    <h4><i class="fas fa-history"></i> Trade History</h4>
                    <div id="tradeHistoryList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // HARDCODED RENDER BACKEND URL - This will work from ANY frontend host!
    const API_URL = 'https://algon-flow-market.onrender.com';

    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (!token) window.location.href = 'index.html';
    
    let currentSymbol = "BTCUSDT";
    let currentSymbolName = "Bitcoin";
    let currentCategory = "crypto";
    let currentLeverage = 100;
    let currentDuration = "1h";
    let currentDurationMs = 3600000;
    let marketPrices = {};
    let userData = null;
    let activeTrades = [];
    let tradeHistory = [];
    let tvWidget = null;
    
    const marketCategories = {
        crypto: [
            { symbol: "BTCUSDT", name: "Bitcoin", tvSymbol: "BINANCE:BTCUSDT" },
            { symbol: "ETHUSDT", name: "Ethereum", tvSymbol: "BINANCE:ETHUSDT" },
            { symbol: "BNBUSDT", name: "Binance Coin", tvSymbol: "BINANCE:BNBUSDT" },
            { symbol: "SOLUSDT", name: "Solana", tvSymbol: "BINANCE:SOLUSDT" },
            { symbol: "XRPUSDT", name: "Ripple", tvSymbol: "BINANCE:XRPUSDT" }
        ],
        commodities: [
            { symbol: "XAUUSD", name: "Gold", tvSymbol: "OANDA:XAUUSD" },
            { symbol: "XAGUSD", name: "Silver", tvSymbol: "OANDA:XAGUSD" },
            { symbol: "USOIL", name: "WTI Crude Oil", tvSymbol: "TVC:USOIL" }
        ],
        forex: [
            { symbol: "EURUSD", name: "Euro/US Dollar", tvSymbol: "FX:EURUSD" },
            { symbol: "GBPUSD", name: "British Pound/US Dollar", tvSymbol: "FX:GBPUSD" },
            { symbol: "USDJPY", name: "US Dollar/Japanese Yen", tvSymbol: "FX:USDJPY" }
        ]
    };
    
    async function fetchUserProfile() {
        try {
            const response = await fetch(`${API_URL}/api/user/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            userData = data.user;
            document.getElementById('userBalance').innerHTML = userData.balance.toFixed(2);
            
            if (userData.aiApiKey) {
                document.getElementById('aiPasskey').value = userData.aiApiKey;
                document.getElementById('passkeyStatus').innerHTML = '<i class="fas fa-check-circle"></i> Passkey is set';
            } else {
                document.getElementById('passkeyStatus').innerHTML = '<i class="fas fa-exclamation-circle"></i> No passkey set - Contact admin';
            }
            
            activeTrades = data.activeTrades || [];
            tradeHistory = data.tradeHistory || [];
            renderActiveTrades();
            renderTradeHistory();
        } catch (error) {
            console.error('Error fetching profile:', error);
        }
    }
    
    async function fetchMarketPrices() {
        for (const cat in marketCategories) {
            for (const market of marketCategories[cat]) {
                try {
                    let price = 0, change = 0, high = 0, low = 0;
                    if (cat === 'crypto') {
                        const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${market.symbol}`);
                        const data = await response.json();
                        price = parseFloat(data.lastPrice);
                        change = parseFloat(data.priceChangePercent);
                        high = parseFloat(data.highPrice);
                        low = parseFloat(data.lowPrice);
                    } else {
                        price = 100 + Math.random() * 900;
                        change = (Math.random() - 0.5) * 3;
                        high = price * 1.02;
                        low = price * 0.98;
                    }
                    marketPrices[market.symbol] = { price, change, high, low, name: market.name };
                } catch (e) {
                    marketPrices[market.symbol] = { price: 50000, change: 0, high: 51000, low: 49000, name: market.name };
                }
            }
        }
        renderMarketsList();
        updateCurrentMarketDisplay();
    }
    
    function renderMarketsList() {
        const markets = marketCategories[currentCategory];
        const container = document.getElementById("marketsList");
        if (!container) return;
        
        container.innerHTML = markets.map(m => {
            const priceData = marketPrices[m.symbol] || { price: 0, change: 0 };
            return `
                <div class="market-item ${currentSymbol === m.symbol ? 'selected' : ''}" onclick="switchMarket('${m.symbol}', '${m.name}')">
                    <div class="market-info">
                        <div class="market-symbol">${m.symbol.replace('USDT', '').replace('USD', '')}/USD</div>
                        <div class="market-name">${m.name}</div>
                    </div>
                    <div class="market-price-info">
                        <div class="market-price">$${priceData.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="market-change ${priceData.change >= 0 ? 'positive' : 'negative'}">${priceData.change >= 0 ? '+' : ''}${priceData.change.toFixed(2)}%</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    async function updateCurrentMarketDisplay() {
        const data = marketPrices[currentSymbol];
        if (data) {
            document.getElementById("currentPrice").innerHTML = `$${data.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById("priceChange").innerHTML = `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%`;
            document.getElementById("priceChange").style.color = data.change >= 0 ? '#00d4aa' : '#ff6b6b';
            document.getElementById("high24h").innerHTML = `$${data.high?.toLocaleString() || '-'}`;
            document.getElementById("low24h").innerHTML = `$${data.low?.toLocaleString() || '-'}`;
        }
        const displaySymbol = currentSymbol.replace("USDT", "").replace("USD", "");
        document.getElementById("marketSelector").innerHTML = `${displaySymbol}/USD ▼`;
    }
    
    window.switchMarket = function(symbol, name) {
        currentSymbol = symbol;
        currentSymbolName = name;
        updateCurrentMarketDisplay();
        renderMarketsList();
        loadTradingViewChart();
    };
    
    function loadTradingViewChart() {
        const container = document.getElementById("tradingview_chart");
        if (container) container.innerHTML = "";
        
        let tvSymbol = "BINANCE:BTCUSDT";
        for (const cat in marketCategories) {
            const market = marketCategories[cat].find(m => m.symbol === currentSymbol);
            if (market && market.tvSymbol) {
                tvSymbol = market.tvSymbol;
                break;
            }
        }
        
        if (typeof TradingView !== 'undefined') {
            if (tvWidget) {
                try { tvWidget.remove(); } catch(e) {}
            }
            tvWidget = new TradingView.widget({
                "width": "100%",
                "height": "100%",
                "symbol": tvSymbol,
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0f1322",
                "enable_publishing": false,
                "container_id": "tradingview_chart"
            });
        } else {
            setTimeout(loadTradingViewChart, 500);
        }
    }
    
    async function savePasskey() {
        const passkey = document.getElementById('aiPasskey').value;
        if (!passkey) {
            showMessage('Please enter your AI Passkey', 'error');
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/ai/save-passkey`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ passkey })
            });
            const data = await response.json();
            if (data.success) {
                showMessage('✅ Passkey saved successfully!', 'success');
                document.getElementById('passkeyStatus').innerHTML = '<i class="fas fa-check-circle"></i> Passkey is set';
                fetchUserProfile();
            } else {
                showMessage(data.error, 'error');
            }
        } catch (error) {
            showMessage('Error saving passkey', 'error');
        }
    }
    
    async function deletePasskey() {
        if (!confirm('Are you sure you want to delete your AI Passkey? You will not be able to start AI trades without it.')) return;
        
        try {
            const response = await fetch(`${API_URL}/api/ai/delete-passkey`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success) {
                showMessage('✅ Passkey deleted successfully!', 'success');
                document.getElementById('aiPasskey').value = '';
                document.getElementById('passkeyStatus').innerHTML = '<i class="fas fa-exclamation-circle"></i> No passkey set';
                fetchUserProfile();
            } else {
                showMessage(data.error, 'error');
            }
        } catch (error) {
            showMessage('Error deleting passkey', 'error');
        }
    }
    
    async function startAITrade() {
        const amount = parseFloat(document.getElementById('aiAmount').value);
        const passkey = document.getElementById('aiPasskey').value;
        
        if (!amount || amount < 115) {
            showMessage('⚠️ Minimum AI trade amount is $115 USD', 'error');
            return;
        }
        
        if (amount > userData?.balance) {
            showMessage('❌ Insufficient balance', 'error');
            return;
        }
        
        if (!passkey) {
            showMessage('⚠️ Please save your AI Passkey first', 'error');
            return;
        }
        
        const analysisDiv = document.getElementById('aiAnalysis');
        const analysisContent = document.getElementById('analysisContent');
        analysisDiv.style.display = 'block';
        analysisContent.innerHTML = '<div style="text-align:center;"><i class="fas fa-spinner fa-pulse"></i> Analyzing market conditions...</div>';
        
        try {
            const response = await fetch(`${API_URL}/api/ai/start-trade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    symbol: currentSymbol,
                    symbolName: currentSymbolName,
                    category: currentCategory,
                    amount: amount,
                    leverage: currentLeverage,
                    duration: currentDuration,
                    durationMs: currentDurationMs,
                    passkey: passkey
                })
            });
            const data = await response.json();
            
            if (data.success) {
                analysisContent.innerHTML = `
                    <div><strong>📊 Decision:</strong> <span style="color: #2dd4bf;">${data.analysis.decision.toUpperCase()}</span> with ${data.analysis.confidence.toFixed(0)}% confidence</div>
                    <div style="margin-top: 8px;"><strong>🎯 Entry Price:</strong> $${data.analysis.entryPrice.toLocaleString()}</div>
                    <div style="margin-top: 8px;"><strong>📈 Analysis:</strong></div>
                    ${data.analysis.reasons.map(r => `<div class="analysis-line">${r}</div>`).join('')}
                    <div style="margin-top: 8px;"><strong>⚡ Signals:</strong></div>
                    <div>${data.analysis.signals.map(s => `<span class="signal-badge">${s}</span>`).join('')}</div>
                `;
                showMessage(`✅ AI Trade Started! ${data.analysis.decision.toUpperCase()} at $${data.analysis.entryPrice.toFixed(2)}`, 'success');
                document.getElementById('aiAmount').value = '';
                fetchUserProfile();
                setTimeout(() => fetchUserProfile(), 5000);
            } else {
                showMessage(data.error, 'error');
                analysisDiv.style.display = 'none';
            }
        } catch (error) {
            showMessage('Error starting AI trade', 'error');
            analysisDiv.style.display = 'none';
        }
    }
    
    function renderActiveTrades() {
        const container = document.getElementById('activeTradesList');
        if (!activeTrades || activeTrades.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: #8a92b0;">No active trades</div>';
            return;
        }
        
        container.innerHTML = activeTrades.map(trade => `
            <div class="trade-item">
                <div style="display: flex; justify-content: space-between;">
                    <span><strong>${trade.symbolName}</strong> <span class="badge badge-active">${trade.side.toUpperCase()}</span></span>
                    <span>$${trade.amount.toFixed(2)} @ ${trade.leverage}x</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px;">
                    <span>Duration: ${trade.duration}</span>
                    <span>Entry: $${trade.entryPrice?.toFixed(2) || '--'}</span>
                    <button onclick="stopTrade('${trade._id}')" style="background: #ff6b6b; border: none; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer;">Stop</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderTradeHistory() {
        const container = document.getElementById('tradeHistoryList');
        if (!tradeHistory || tradeHistory.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: #8a92b0;">No trade history</div>';
            return;
        }
        
        container.innerHTML = tradeHistory.slice(0, 20).map(trade => `
            <div class="trade-item">
                <div style="display: flex; justify-content: space-between;">
                    <span><strong>${trade.symbolName}</strong> <span class="badge ${trade.profit >= 0 ? 'badge-completed' : 'badge-loss'}">${trade.status}</span></span>
                    <span class="${trade.profit >= 0 ? 'trade-profit' : 'trade-loss'}">${trade.profit >= 0 ? '+' : ''}$${trade.profit?.toFixed(2) || '0'}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #8a92b0;">
                    <span>Amount: $${trade.amount}</span>
                    <span>Duration: ${trade.duration}</span>
                    <span>${new Date(trade.endedAt || trade.startedAt).toLocaleString()}</span>
                </div>
            </div>
        `).join('');
    }
    
    window.stopTrade = async function(tradeId) {
        try {
            const response = await fetch(`${API_URL}/api/ai/stop-trade/${tradeId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success) {
                showMessage(`Trade stopped. Profit/Loss: $${data.profit?.toFixed(2)}`, 'success');
                fetchUserProfile();
            }
        } catch (error) {
            showMessage('Error stopping trade', 'error');
        }
    };
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('tradeMessage');
        msgDiv.innerHTML = msg;
        msgDiv.style.color = type === 'error' ? '#ff6b6b' : '#2dd4bf';
        setTimeout(() => msgDiv.innerHTML = '', 5000);
    }
    
    document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            let page = btn.dataset.page;
            
            if (page === 'profile') {
                window.location.href = 'profile.html';
                return;
            }
            
            document.getElementById("dashboardPage").style.display = page === "dashboard" ? "flex" : "none";
            document.getElementById("portfolioPage").style.display = page === "portfolio" ? "block" : "none";
            document.getElementById("historyPage").style.display = page === "history" ? "block" : "none";
        };
    });
    
    document.querySelectorAll(".category-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.dataset.category;
            renderMarketsList();
        };
    });
    
    document.querySelectorAll(".leverage-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".leverage-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentLeverage = parseInt(btn.dataset.leverage);
        };
    });
    
    document.querySelectorAll(".duration-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".duration-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentDuration = btn.dataset.duration;
            currentDurationMs = parseInt(btn.dataset.ms);
        };
    });
    
    document.getElementById("savePasskeyBtn").onclick = savePasskey;
    document.getElementById("deletePasskeyBtn").onclick = deletePasskey;
    document.getElementById("startAIBuyBtn").onclick = startAITrade;
    document.getElementById("depositBtn").onclick = () => window.location.href = 'deposit.html';
    document.getElementById("withdrawBtn").onclick = () => window.location.href = 'withdraw.html';
    
    fetchUserProfile();
    fetchMarketPrices();
    loadTradingViewChart();
    
    setInterval(() => {
        fetchMarketPrices();
        fetchUserProfile();
    }, 30000);
</script>
</body>
</html>
